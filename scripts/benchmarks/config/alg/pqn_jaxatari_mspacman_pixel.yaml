# PQN pixel-based config for MsPacman
NAME_INITIALS: "RE"
ALG_NAME: "pqn"
TOTAL_TIMESTEPS: 5e7
TOTAL_TIMESTEPS_DECAY: 5e7
NUM_ENVS: 128
NUM_STEPS: 16
EPS_START: 1.0
EPS_FINISH: 0.001
EPS_DECAY: 0.1
NUM_EPOCHS: 2
NUM_MINIBATCHES: 32
NORM_TYPE: "layer_norm"
LR: 2.5e-4
MAX_GRAD_NORM: 10
LR_LINEAR_DECAY: False
GAMMA: 0.99
LAMBDA: 0.65

# env specific
ENV_NAME: "MsPacman"
ENV_KWARGS: {}
OBJECT_CENTRIC: False
PIXEL_GRAYSCALE: True
PIXEL_RESIZE: True
PIXEL_RESIZE_SHAPE: [84, 84]
USE_NATIVE_DOWNSCALING: False
MOD_NAME: null

TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 128
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0
RECORD_VIDEO: True
